<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Loading...</title>
    <script type="text/javascript">
      // Save the path that user was trying to access
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      var redirect = '/' + pathSegments.join('/');
      
      // Store it so React can access it
      sessionStorage.setItem('postBuildRedirect', redirect);
      
      // Redirect to the root so React Router can handle it
      window.location.replace(window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1));
    </script>
  </head>
  <body>
  </body>
</html>
