<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page App</title>
    <script type="text/javascript">
      // Store the redirect path before reloading
      var redirect = window.location.pathname;
      if (redirect !== '/' && !redirect.includes('/?')) {
        // Redirect to root with the original path as a query parameter
        sessionStorage.redirect = redirect;
        window.location.href = '/jonathancw-tang/?redirect=' + encodeURIComponent(redirect);
      }
    </script>
  </head>
  <body>
  </body>
</html>
